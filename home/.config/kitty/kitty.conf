# See https://sw.kovidgoyal.net/kitty/conf.html

shell_integration no-title

# default dark
background #181818
foreground #d8d8d8
selection_background #d8d8d8
selection_foreground #181818
url_color #b8b8b8
cursor #d8d8d8
