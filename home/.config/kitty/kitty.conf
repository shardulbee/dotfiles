allow_remote_control yes
enabled_layouts fat:bias=70, stack
bold_font OperatorMono Nerd Font Medium
bold_italic_font OperatorMono Nerd Font Medium Italic
font_family OperatorMono Nerd Font Regular
font_size 16
foreground #e0e0e0
inactive_border_color #303030
inactive_tab_background #303030
inactive_tab_foreground #d0d0d0
input_delay 1
italic_font OperatorMono Nerd Font Italic
listen_on unix:/tmp/mykitty
macos_option_as_alt yes
repaint_delay 1
selection_background #e0e0e0
selection_foreground #000000
tab_bar_background #303030
url_color #d0d0d0
startup_session startup_session.conf

map cmd+[ previous_window
map cmd+] next_window
map cmd+e kitten hints
map cmd+ctrl+enter launch --type=window --title=current
map cmd+equal change_font_size all +2.0
map cmd+minus change_font_size all -2.0
map cmd+shift+[ previous_tab
map cmd+shift+] next_tab
# map cmd+t launch --title=current --type=tab --cwd=current
map cmd+w close_window
map f11 last_used_layout

map cmd+ctrl+left resize_window wider
map cmd+ctrl+right resize_window narrower
map cmd+ctrl+up resize_window taller
map cmd+ctrl+down resize_window shorter
map cmd+ctrl+= resize_window reset
startup_session startup_session.conf

map cmd+enter kitten toggle_terminal.py

map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

map ctrl+j kitten pass_keys.py bottom ctrl+j
map ctrl+k kitten pass_keys.py top    ctrl+k
map ctrl+h kitten pass_keys.py left   ctrl+h
map ctrl+l kitten pass_keys.py right  ctrl+l

# kitty-scrollback.nvim Kitten alias
action_alias kitty_scrollback_nvim kitten /Users/shardul/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py

# Browse scrollback buffer in nvim
map kitty_mod+h kitty_scrollback_nvim
# Browse output of the last shell command in nvim
map kitty_mod+g kitty_scrollback_nvim --config ksb_builtin_last_cmd_output
# Show clicked command output in nvim
mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output
