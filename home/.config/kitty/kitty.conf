# See https://sw.kovidgoyal.net/kitty/conf.html

allow_remote_control yes
input_delay 1
repaint_delay 1
listen_on unix:/tmp/mykitty
macos_option_as_alt yes
enabled_layouts tall,fat,stack

# --------------------------------------------------------
# Font
# --------------------------------------------------------
font_family BlexMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 14

