start-at-login = true
accordion-padding = 10
default-root-container-layout = 'tiles'
key-mapping.preset = 'qwerty'
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center']

[gaps]
inner.horizontal = 15
inner.vertical = 15
outer.left = 15
outer.bottom = 15
outer.top = 15
outer.right = 15

[mode.main.binding]
alt-h = 'focus --boundaries all-monitors-outer-frame left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus --boundaries all-monitors-outer-frame right'

alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace Z'

alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace Z'

# example
# [[on-window-detected]]
# if.app-id = 'com.apple.systempreferences'
# if.app-name-regex-substring = 'settings'
# if.window-title-regex-substring = 'substring'
# if.workspace = 'workspace-name'
# if.during-aerospace-startup = true
# check-further-callbacks = true
# run = ['layout floating', 'move-node-to-workspace S']  # The callback itself

[[on-window-detected]]
if.app-name-regex-substring = 'Raycast'
run = ['layout floating']

[[on-window-detected]]
if.app-name-regex-substring = '1Password'
run = ['layout floating']

[[on-window-detected]]
if.app-name-regex-substring = 'Zed'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-name-regex-substring = 'Cursor'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-name-regex-substring = 'kitty'
run = ['move-node-to-workspace Z']

[[on-window-detected]]
if.app-name-regex-substring = 'Chrome'
run = ['move-node-to-workspace 3']

[[on-window-detected]]
if.app-name-regex-substring = 'Logseq'
run = ['move-node-to-workspace N']
